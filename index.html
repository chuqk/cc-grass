<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>cc-grass</title>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    box-sizing: border-box;
  }
  .cc-section { max-width: 100%; }
  .cc-section-title { font-size: 14px; color: #c9d1d9; margin-bottom: 8px; }
  .cc-frame {
    border: 1px solid #30363d;
    border-radius: 6px;
    background: #0d1117;
  }
  @media (max-width: 800px) {
    .cc-frame { overflow: hidden; }
    .cc-scroll {
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .cc-scroll::-webkit-scrollbar { display: none; }
  }
  .cc-scroll svg rect[data-date]:hover {
    stroke: #ffffff;
    stroke-width: 1;
    cursor: default;
  }
  #cc-grass-scroll > svg > text:first-of-type { display: none; }
  #cc-grass-scroll > svg > rect:first-child,
  #cc-grass-scroll > svg > rect:nth-child(2) { display: none; }
  #cc-grass-scroll > svg { margin-top: -40px; }
  .cc-scroll svg rect[data-week] { cursor: default; }
  .cc-scroll svg rect[data-week]:hover { opacity: 0.85; }
  .cc-legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px 14px;
    padding: 10px 16px;
    border-top: 1px solid #21262d;
    font-size: 11px;
    color: #7d8590;
  }
  .cc-legend span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .cc-legend i {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
    display: inline-block;
    font-style: normal;
  }
</style>
</head>
